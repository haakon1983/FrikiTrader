<div class="auth-container">
    <div class="auth-card animate__animated animate_fadeIn">
        <div class="auth-header">
            <i class="bi bi-controller brand-icon"></i>
            <h1 class="brand-name">FrikiTrader</h1>
            <p class ="brand-tagline">Regístrate para comenzar a intercambiar productos</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label for="username">Nombre de Usuario</label>
                <input type="text" class="custom-input" id="username" placeholder="Ingresa tu nombre de usuario">
            </div>

            <div class="mb-3">
                <label for="email">Correo Electrónico</label>
                <input type="email" class="custom-input" id="email" placeholder="Ingresa tu correo electrónico">
            </div>

            <div class="mb-3">
                <label for="password">Contraseña</label>
                <input type="password" class="custom-input" id="password" placeholder="*****************">
            </div>

            <div class="avatar-section mb-4">
                <label>Foto de Perfil (Opcional)</label>
                <div class="d-flex align-items-center gap-3 mt-2">
                    <div class="avatar-preview">
                        <img *ngIf="avatarUrl" [src]="avatarUrl" class="img-fluid rounded-circle-custom">
                        <i *ngIf="!avatarUrl" class="bi bi-person-fill"></i>
                    </div>
                    <div class="flex-grow-1">
                        <label for="avatar-input" class="btn-outline-gold">
                            <i class="bi bi-upload me-2"></i>
                            {{ avatarUrl ? 'Cambiar imagen' : 'Seleccionar imagen' }}
                        </label>
                        <input 
                            type="file" 
                            id="avatar-input" 
                            #avatarInput
                            hidden 
                            accept="image/*"
                            (change)="onFileSelected($event)">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary">Crear cuenta</button>
        </form>

        <div class="auth-footer-links">
            <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
        </div>    
    </div>
</div>
