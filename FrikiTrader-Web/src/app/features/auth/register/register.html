<div class="auth-container">
    <div class="auth-card animate__animated animate_fadeIn">
        <div class="auth-header">
            <i class="bi bi-controller brand-icon"></i>
            <h1 class="brand-name">FrikiTrader</h1>
            <p class ="brand-tagline">Regístrate para comenzar a intercambiar productos</p>
        </div>

        <form class="auth-form">
            <div class="mb-3">
                <label for="username">Nombre de Usuario</label>
                <input type="text" class="custom-input" id="username" placeholder="Ingresa tu nombre de usuario">
            </div>

            <div class="mb-3">
                <label for="email">Correo Electrónico</label>
                <input type="email" class="custom-input" id="email" placeholder="Ingresa tu correo electrónico">
            </div>

            <div class="mb-3">
                <label for="password">Contraseña</label>
                <input type="password" class="custom-input" id="password" placeholder="*****************">
            </div>

            <div class="avatar-upload mb-4">
                <div class="avatar-preview">
                    <i class="bi bi-person-circle" id="avatar-icon"></i>
                </div>
                <label for="avatar-input" class="btn-avatar-select">
                    <i class="bi bi-camera-fill"></i> Elegir Avatar
                </label>
                <input type="file" id="avatar-input" accept="image/*" hidden>
            </div>

            <button type="submit" class="btn-primary">Crear cuenta</button>
        </form>

        <div class="auth-footer-links">
            <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
        </div>    
    </div>
</div>
