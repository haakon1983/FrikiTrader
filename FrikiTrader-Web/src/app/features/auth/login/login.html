<div class="auth-container" d-flex justify-content-center align-items-center>
    <div class="auth-card shadow-lg p-4">
        <div class="text-center mb-4">
            <i class="bi bi-controller brand-icon md-2"></i>
            <h2 class="fw-bold brand-name">FrikiTrader</h2>
            <p class="text-muted">Intercambia tus productos frikis favoritos</p>
        </div>

        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control custom-input" id="email" placeholder="Tu correo electrónico">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control custom-input" id="password" placeholder="*********">
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Iniciar Sesión</button>

            <div class="text-center">
                <a href="#" class="small text-decoration-none text-muted">¿Olvidaste tu contraseña?</a>
                <br>
                <p class="mb-0">¿No tienes cuenta?<a routerLink="/register" class="text-gold fw-bold text-decoration-none">Resgístrate</a></p>
            </div>  
        </form>
    </div>    
</div>
