<div class="container py-4">
  <div class="form-container shadow-lg">
    <div class="row g-0">

      <div class="mb-4">
        <button class="btn btn-link text-decoration-none p-0 text-dark fw-bold" (click)="goBack()">
          <i class="bi bi-arrow-left-short fs-4"></i> Volver al inicio
        </button>
      </div>
      
      <div class="col-lg-5 upload-section">
        <label class="image-dropzone" [class.has-preview]="imagePreview">
          <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
          
          <div *ngIf="!imagePreview" class="text-center">
            <i class="bi bi-cloud-arrow-up-fill display-2 text-primary"></i>
            <p class="mt-3 fw-bold">Sube la mejor foto de tu producto...</p>
            <span class="text-muted small">JPG, PNG o WebP</span>
          </div>

          <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img">
          
          <div *ngIf="imagePreview" class="change-overlay">
            <span>Cambiar imagen</span>
          </div>
        </label>
      </div>

      <div class="col-lg-7 p-4 p-md-5 bg-white">
        <h2 class="mb-4 fw-bold border-bottom pb-2">Vender Artículo</h2>
        
        <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-12 mb-3">
              <label class="form-label fw-bold">Nombre del producto</label>
              <input type="text" formControlName="nombre" class="form-control" placeholder="Ej: Dragon Ball Manga Vol. 1">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Precio</label>
              <div class="input-group">
                <input type="number" formControlName="precio" class="form-control" placeholder="0.00">
                <span class="input-group-text">€</span>
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label small text-muted  fw-bold">Estado del producto</label>
              <select formControlName="estado" class="form-select custom-input">
                <option *ngFor="let cond of estadosDummy" [value]="cond.id">
                  {{ cond.nombre }}
                </option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Categoría</label>
              <select formControlName="categoria_id" class="form-select">
                <option value="" disabled>Selecciona...</option>
                <option *ngFor="let cat of categoriasDummy" [value]="cat.id">
                  {{ cat.nombre }}
                </option>
              </select>
            </div>

            <div class="col-12 mb-4">
              <label class="form-label fw-bold">Descripción</label>
              <textarea formControlName="descripcion" class="form-control" rows="4" placeholder="Describe el estado, si es original, etc."></textarea>
            </div>

            <div class="col-12">
              <button type="submit" [disabled]="productForm.invalid || isUploading" class="btn btn-primary btn-lg w-100 shadow">
                <span *ngIf="!isUploading">Publicar en FrikiTrader</span>
                <span *ngIf="isUploading" class="spinner-border spinner-border-sm"></span>
              </button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
